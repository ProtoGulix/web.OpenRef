services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: openref
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openref"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── OCR Service ─────────────────────────────────────────────────────────────
  ocr-service:
    build: ./ocr-service
    restart: unless-stopped
    volumes:
      - ./ocr-service:/app          # hot-reload --reload
      - ./storage:/storage
      - easyocr_models:/root/.EasyOCR
    environment:
      STORAGE_ROOT: /storage/pages
      DATABASE_URL: postgresql://postgres:postgres@db:5432/openref
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

  # ── Scraper Service ─────────────────────────────────────────────────────────
  scraper-service:
    build: ./scraper-service
    restart: unless-stopped
    volumes:
      - ./scraper-service:/app      # hot-reload --reload
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/openref
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy

  # ── Backend Node.js ─────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./backend/src:/app/src      # hot-reload --watch
      - ./storage:/storage
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/openref
      PORT: 3001
      OCR_SERVICE_URL: http://ocr-service:8001
      SCRAPER_SERVICE_URL: http://scraper-service:8002
      STORAGE_ROOT: /storage
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend React ──────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src     # hot-reload Vite HMR
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  easyocr_models:
